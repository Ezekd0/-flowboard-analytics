site_name: TaskFlow Analytics
site_description: Production-ready FastAPI backend for task management and analytics.
site_url: https://[your-domain.com]/docs
repo_name: [your-username]/taskflow-analytics
repo_url: https://github.com/[your-username]/taskflow-analytics
theme:
  name: material

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
  - API:
      - Overview: api/overview.md
      - Authentication: api/authentication.md
      - Tasks: api/tasks.md
      - Analytics: api/analytics.md
  - Deployment:
      - Docker: deployment/docker.md
      - Production: deployment/production.md
  - Contributing: contributing.md
  - Security: security.md

markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
