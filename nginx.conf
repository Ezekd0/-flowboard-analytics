worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Rate limit: 100 requests per second per client IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Upstream load balancing for multiple API instances
    upstream taskflow_api {
        least_conn;
        server api:8000 max_fails=3 fail_timeout=30s;
        # Add more replicas in production scaling scenarios:
        # server api_2:8000 max_fails=3 fail_timeout=30s;
        # server api_3:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name [your-domain.com];
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name [your-domain.com];

        # SSL placeholders; replace with your real cert files.
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none';" always;

        client_max_body_size 20m;

        location /static/ {
            alias /app/app/static/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location / {
            limit_req zone=api_limit burst=200 nodelay;

            proxy_pass http://taskflow_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
        }
    }
}
