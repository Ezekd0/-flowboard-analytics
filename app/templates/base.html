<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow Analytics{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <a class="brand" href="/">
                <span class="brand-mark">TF</span>
                <span>
                    <strong>TaskFlow</strong>
                    <small>Analytics</small>
                </span>
            </a>
            <nav class="nav-links" aria-label="Main navigation">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Overview</a>
                <a href="/dashboard" class="{% if request.url.path == '/dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/api/docs">API Docs</a>
                <a href="/about" class="{% if request.url.path == '/about' %}active{% endif %}">About</a>
            </nav>
        </header>

        <main class="page">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
