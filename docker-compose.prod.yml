version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_api_prod
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000 --access-logfile - --error-logfile -
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql://taskflow:${POSTGRES_PASSWORD}@db:5432/taskflow_prod
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal
      - edge

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_celery_worker_prod
    command: celery -A app.core.celery_app worker --loglevel=INFO
    env_file:
      - .env.production
    depends_on:
      - redis
      - db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_celery_beat_prod
    command: celery -A app.core.celery_app beat --loglevel=INFO
    env_file:
      - .env.production
    depends_on:
      - redis
      - db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: taskflow_db_prod
    environment:
      POSTGRES_DB: taskflow_prod
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow_nginx_prod
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - edge

  backup:
    image: postgres:16-alpine
    container_name: taskflow_backup_prod
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_CRON: "0 2 * * *"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo "$${BACKUP_CRON} pg_dump -h db -U taskflow taskflow_prod > /backups/taskflow_$$(date +\%F_\%H-\%M-\%S).sql" > /etc/crontabs/root &&
        crond -f -l 8
    volumes:
      - backups:/backups
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_prod_data:
  redis_prod_data:
  backups:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
